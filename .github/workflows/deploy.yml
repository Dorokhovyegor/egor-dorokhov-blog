name: Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-blog-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
        run: |
          set -eu
          missing=""
          [ -n "${SSH_PRIVATE_KEY:-}" ] || missing="$missing SSH_PRIVATE_KEY"
          [ -n "${SSH_HOST:-}" ] || missing="$missing SSH_HOST"
          [ -n "${SSH_USER:-}" ] || missing="$missing SSH_USER"
          [ -n "${DEPLOY_PATH:-}" ] || missing="$missing DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "Missing required GitHub Actions secrets:$missing"
            exit 1
          fi

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy dist via rsync
        env:
          SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
        run: |
          set -eu
          PORT="${SSH_PORT:-22}"
          rsync -az --delete -e "ssh -p $PORT" dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
